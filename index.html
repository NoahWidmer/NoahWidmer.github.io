<!doctype html>
<html>
  <head>
    <meta charset="utf-8" />
    <meta http-equiv="X-UA-Compatible" content="IE=edge" />
    <title>Noah Widmer *Illustration</title>
    <link rel="icon" type="image/x-icon" href="favicon.ico" />
    <meta name="description" content="" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <link rel="stylesheet" href="assets/style.css" />
    <script src="https://unpkg.com/masonry-layout@4/dist/masonry.pkgd.min.js"></script>
  </head>
  <body>
    <header>
      <div class="mycontainer">
        <div class="item-1">
          <a href="https://noahwidmer.ch/">
            <img src="Images/WebsiteHeader.png" alt="Homepage" />
          </a>
        </div>

        <div class="item-2">
          <a href="https://noahwidmer.ch/about/">
            <img src="Images/WebsiteAboutBlack.png" alt="About" />
          </a>
        </div>
      </div>
    </header>

    <main>
      <!-- do fohd header ond so ah-->
      <br />
      <br />

      <div class="grid masonry-container">
        <a
          class="grid-item project-teaser"
          href="https://noahwidmer.ch/Projekte/Infografik"
        >
          <img src="Thumbnails/project1.webp" alt="Infografik Projekt" width="1830" height="2600" fetchpriority="high"/>
        </a>
        <a
          class="grid-item project-teaser"
          href="https://noahwidmer.ch/Projekte/Kaefer"
          >
          <img src="Thumbnails/project2.webp" alt="Kaefer Projekt" width="1020" height="656"/>
        </a>
        <a
          class="grid-item project-teaser"
          href="https://noahwidmer.ch/Projekte/Storyboard"
        >
          <img src="Thumbnails/project3.webp" alt="Storyboards" width="1135" height="1062" />
        </a>
        <a
          class="grid-item project-teaser"
          href="https://noahwidmer.ch/Projekte/Persoenlich"
        >
          <img src="Thumbnails/project4.webp" alt="Selbstportrait" width="2048" height="2048"/>
        </a>
        <a
          class="grid-item project-teaser"
          href="https://de.wikipedia.org/wiki/Katzen"
        >
          <img src="Thumbnails/Catito.gif" alt="Katze" width="960" height="540"/>
        </a>
      </div>
    </main>

    <footer class="footer">
      <p>
        Noah Widmer<br />
        &copy;2026
      </p>
    </footer>
    <script>
      var elem = document.querySelector(".grid");
      var msnry = new Masonry(elem, {
        // options
        // Hier kommen alle optionen die Masonry zur verfügung stellt.
        itemSelector: ".grid-item",
        percentPosition: true,
      });
    </script>
  </body>
</html>
